name: Legacy manual deploy to Hostinger

on:
  workflow_dispatch:

concurrency:
  group: jamagax-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html style.css app.js robots.txt sitemap.xml dist/
          cp -R assets jamagax_models dist/

      - name: Verify build
        run: |
          test -f dist/index.html
          test -f dist/app.js
          test -f dist/jamagax_models/TemploDeMorfeo.glb
          test -f dist/assets/downloads/Jamagax-CV-2026-ES.pdf

      - name: Publish to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ftp.hostinger.com
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/jamagax/
